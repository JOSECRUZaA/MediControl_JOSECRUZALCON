{% extends 'base.html' %}
{% block content %}
<div class='d-flex justify-content-between align-items-center mb-3'>
  <h1>Citas médicas</h1>
  <a class='btn btn-success' href='{{ url_for('citas.crear') }}'>Nueva cita</a>
</div>
<table class='table table-striped'>
  <thead>
    <tr><th>ID</th><th>Fecha</th><th>Hora</th><th>Médico</th><th>Paciente</th><th>Acciones</th></tr>
  </thead>
  <tbody>
    {% for cita in citas %}
    <tr>
      <td>{{ cita.id }}</td>
      <td>{{ cita.fecha }}</td>
      <td>{{ cita.hora }}</td>
      <td>{{ cita.medico.nombre }}</td>
      <td>{{ cita.paciente.nombre }}</td>
      <td>
        <a class='btn btn-sm btn-primary' href='{{ url_for('citas.editar', id=cita.id) }}'>Editar</a>
        <a class='btn btn-sm btn-danger' href='{{ url_for('citas.eliminar', id=cita.id) }}'>Eliminar</a>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
