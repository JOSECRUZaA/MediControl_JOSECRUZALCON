<!doctype html>
<html lang='es'>
  <head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <title>MediControl</title>
    <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css' rel='stylesheet'>
  </head>
  <body>
    <nav class='navbar navbar-expand-lg navbar-dark bg-primary mb-4'>
      <div class='container-fluid'>
        <a class='navbar-brand' href='/'>MediControl</a>
        <div class='collapse navbar-collapse'>
          <ul class='navbar-nav me-auto mb-2 mb-lg-0'>
            <li class='nav-item'><a class='nav-link' href="{{ url_for('medicos.listar') }}">Médicos</a></li>
            <li class='nav-item'><a class='nav-link' href="{{ url_for('pacientes.listar') }}">Pacientes</a></li>
            <li class='nav-item'><a class='nav-link' href="{{ url_for('citas.listar') }}">Citas</a></li>
          </ul>
        </div>
      </div>
    </nav>
    <main class='container'>
      {% block content %}{% endblock %}
    </main>
    <script src='https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js'></script>
  </body>
</html>
