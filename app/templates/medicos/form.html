{% extends 'base.html' %}
{% block content %}
<h1>{{ 'Editar' if medico else 'Crear' }} médico</h1>
<form method='post'>
  <div class='mb-3'>
    <label class='form-label'>Nombre</label>
    <input class='form-control' name='nombre' required value='{{ medico.nombre if medico else '' }}'>
  </div>
  <div class='mb-3'>
    <label class='form-label'>Especialidad</label>
    <input class='form-control' name='especialidad' required value='{{ medico.especialidad if medico else '' }}'>
  </div>
  <button class='btn btn-primary' type='submit'>Guardar</button>
  <a class='btn btn-secondary' href='{{ url_for('medicos.listar') }}'>Cancelar</a>
</form>
{% endblock %}
